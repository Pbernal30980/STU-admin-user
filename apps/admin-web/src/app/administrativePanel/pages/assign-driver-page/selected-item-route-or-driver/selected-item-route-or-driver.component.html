<style>
  .top-100 {
    top: 100%
  }

  .bottom-100 {
    bottom: 100%
  }

  .max-h-select {
    max-height: 100px;
  }
</style>
<div class="mt-5 max-w-xl sm:mt-5 mx-auto ">
  <div class="flex flex-col relative">
    <label class="block text-sm font-semibold leading-6 text-stu-text">{{title()}}</label>

    <div class="w-full relative">
      <div class="w-full my-2 flex relative">
        <div class="flex flex-auto flex-wrap"></div>
        <input [value]="selected()" placeholder="Search by position"
          class="soft-input pr-10">
        <div class="absolute right-0 top-0 bottom-0 text-stu-text/50 w-10 flex items-center justify-center border-l border-stu-border">
          <button (click)="toggleDropdown()"
            class="cursor-pointer w-full h-full flex items-center justify-center outline-none focus:outline-none hover:text-stu-text">
            <svg class="transition-transform duration-200 w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none"
              viewBox="0 0 24 24" stroke="currentColor">
              <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
          </button>
        </div>
      </div>
    </div>

    @if(isDropdownOpen){
    <div class="absolute shadow-lg bg-stu-panel border border-stu-border top-full mt-1 z-40 w-full rounded-xl max-h-select overflow-y-auto">
      @for (item of list(); track item) {
      <div class="flex flex-col w-full">
        <div class="cursor-pointer w-full border-b border-stu-border/50 last:border-0 hover:bg-stu-input transition-colors">
          <div class="flex w-full items-center p-3 relative">
            <div class="w-full items-center flex">
              <div (click)="add.emit(item)" class="w-full text-stu-text font-medium">{{item.name}}</div>
            </div>
          </div>
        </div>
      </div>
      }
    </div>

    <div class="h-28">


    </div>

    }

  </div>
</div>
