<app-header [title]="'Asignar Conductor'"></app-header>
<div class="isolate modal-surface px-6 mt-5 mb-5 py-10 sm:py-5 lg:px-8">


  <div class="flex flex-wrap md:flex-nowrap justify-center px-6 ml-5 items-end gap-4">
    <div class="w-full md:w-1/2 mt-5 h-full">
      <app-selected-item-route-or-driver
      [title]="'Rutas'"
      [list]="serviceRoute.routes()"
      [selected]="serviceRoute.routeSelected()?.name"
      (add)="serviceRoute.addRoute($event)"
      (clear)="serviceRoute.clearRouteSelected()"
      />

    </div>
    <div class="w-full md:w-1/2 mt-5 h-full">
      <app-selected-item-route-or-driver
      [title]="'Conductores'"
      [list]="serviceUser.userDriver()"
      [selected]="serviceUser.userSelected()?.name"
      (add)="serviceUser.addUser($event)"
      (clear)="serviceUser.clearUserSelected()"
      />

    </div>
    <div class="mt-5 mb-1 md:mb-0">
      <button class="primary-button !w-auto !py-2 !px-6"
        (click)="createDriverAssignmet()">Asignar</button>
    </div>
  </div>

  <div class="overflow-hidden rounded-2xl border border-stu-border shadow-sm m-5 mt-8">
    <table class="w-full border-collapse bg-stu-panel text-left text-sm text-stu-text">
      <thead class="bg-stu-accent text-white">
        <tr>
          <th scope="col" class="px-6 py-4 font-semibold">Ruta</th>
          <th scope="col" class="px-6 py-4 font-semibold">Conductor Asignado</th>
          <th scope="col" class="px-6 py-4 font-semibold"></th>
        </tr>
      </thead>
      <tbody class="divide-y divide-stu-border border-t border-stu-border">
        @for (item of serviceAssignDriver.assignDrivers(); track $index) {

          <tr class="hover:bg-stu-input transition-colors">
            <th class="flex gap-3 px-6 py-4 font-normal text-stu-text">

              <div class="text-sm">
            <div class="font-medium text-stu-text">
              {{ getRouteNameById(item.routeId) }}
            </div>
          </div>
        </th>
        <td class="px-6 py-4">{{getUserNameById(item.driverId)}}</td>
        <td class="px-6 py-4">
          <div class="flex justify-end gap-4">
            <a x-data="{ tooltip: 'Delete' }" class="cursor-pointer text-rose-500 hover:text-rose-700 transition" (click)="serviceAssignDriver.deleteDriverAssignment(item.id!)">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="h-6 w-6" x-tooltip="tooltip">
              <path stroke-linecap="round" stroke-linejoin="round"
              d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
            </svg>
          </a>

        </div>
      </td>
    </tr>
  }
  </tbody>
</table>
</div>

</div>
