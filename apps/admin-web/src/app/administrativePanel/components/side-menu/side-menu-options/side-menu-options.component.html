<div id="nav" class="mt-5 flex flex-1 flex-col gap-2 overflow-y-auto px-1 pb-4">
  @for (item of menuOptions; track item.route) {
  <a
    [routerLink]="item.route"
    routerLinkActive="nav-link-active"
    class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-slate-100/90 transition duration-200 hover:bg-white/10 hover:text-white"
  >
    <span class="flex h-10 w-10 items-center justify-center rounded-2xl bg-white/10 text-white ring-1 ring-white/10">
      <i [class]="item.icon" [style]="item.style"></i>
    </span>
    <span class="flex flex-col leading-tight">
      <span class="text-[15px] font-semibold">{{item.label}}</span>
      <span class="text-[11px] text-slate-200/70">Acceder</span>
    </span>
  </a>
  }
  <div class="mt-auto pt-4">
    <app-logout-button />
  </div>
</div>
