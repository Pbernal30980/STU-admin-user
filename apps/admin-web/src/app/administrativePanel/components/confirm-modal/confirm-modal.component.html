<div class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center px-4 animate-in fade-in duration-200">
  <div class="modal-surface w-full max-w-md p-6 shadow-2xl animate-in zoom-in-95 duration-200">
    <h2 class="text-xl font-bold text-stu-text font-poppins">{{title()}}</h2>
    <p class="mt-3 text-sm text-stu-text/80 leading-relaxed">
      {{message()}} <strong>({{ itemName() }})</strong>?
    </p>
    <div class="mt-6 flex justify-end gap-3">
      <button 
        (click)="closeModal.emit()" 
        class="cursor-pointer rounded-2xl bg-stu-input border border-stu-border px-5 py-2.5 text-sm font-semibold text-stu-text transition hover:bg-stu-border/80 focus:outline-none focus:ring-2 focus:ring-stu-border/50"
      >
        Cancelar
      </button>
      <button 
        (click)="showToast.set(true); confirm.emit()" 
        [style.background-color]="colorButton() === 'red' ? '#ef4444' : (colorButton() === 'blue' ? '#3b82f6' : colorButton())"
        class="cursor-pointer rounded-2xl px-5 py-2.5 text-sm font-semibold text-white transition hover:brightness-110 shadow-lg shadow-rose-500/10 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-stu-panel"
      >
        {{buttonMessage()}}
      </button>
    </div>
  </div>
</div>

@if (showToast()) {
  <app-toast [message]="toastMessage()" [color]="'green'"/>
}
