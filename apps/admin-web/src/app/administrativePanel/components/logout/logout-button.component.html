<div class="mt-4 pt-4 border-t border-stu-border">
  <!-- User row -->
  <div class="mb-3 flex items-center gap-3 px-2">
    <div class="flex h-9 w-9 items-center justify-center rounded-full bg-stu-accent/10 border border-stu-accent/20 shrink-0">
      <i class="fa-solid fa-user text-stu-accent text-sm"></i>
    </div>
    <div class="min-w-0">
      <p class="truncate text-[13px] font-semibold text-stu-text leading-tight">{{ userName || 'Usuario' }}</p>
      <p class="text-[11px] text-stu-text/50 leading-tight">Administrador</p>
    </div>
  </div>

  <!-- Logout button -->
  <button
    (click)="openModal()"
    class="group flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-stu-text/80 transition duration-200 hover:bg-rose-500/10 hover:text-rose-600 dark:hover:text-rose-400 focus:outline-none"
  >
    <span class="flex h-10 w-10 items-center justify-center rounded-2xl bg-stu-input ring-1 ring-stu-border text-slate-600 dark:text-stu-text transition-colors group-hover:bg-rose-500/10 group-hover:text-rose-600 dark:group-hover:text-rose-400 group-hover:ring-rose-500/20 shrink-0">
      <i class="fa-solid fa-arrow-right-from-bracket text-sm"></i>
    </span>
    <span class="font-semibold">Cerrar sesión</span>
  </button>
</div>

@if (showLogoutModal()) {
  <app-confirm-modal
    [itemName]="userName!"
    [title]="'Confirmar cierre'"
    [message]="'¿Estás seguro de cerrar sesion'"
    [colorButton]="'red'"
    [buttonMessage]="'Cerrar sesión'"
    [toastMessage]="'Sesión cerrada con éxito'"
    (confirm)="confirmLogout()"
    (closeModal)="showLogoutModal.set(false)"
  ></app-confirm-modal>
}
