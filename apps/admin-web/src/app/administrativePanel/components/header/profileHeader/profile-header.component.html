<div class="hidden lg:flex lg:items-center lg:ml-4 relative">
  <!-- Profile Trigger -->
  <div class="relative flex items-center cursor-pointer select-none" (click)="toggleDropdown()">
    <button type="button"
            class="relative flex h-10 w-10 items-center justify-center rounded-full bg-stu-input ring-2 ring-stu-border hover:ring-stu-accent text-slate-600 dark:text-stu-text transition-all duration-300">
      <i class="fa-solid fa-user text-sm"></i>
    </button>
    <button type="button" class="ml-2 text-emerald-500 transition-transform duration-300" [class.rotate-180]="isOpen()">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    </button>
  </div>

  <!-- Glassmorphic Dropdown Menu -->
  @if (isOpen()) {
    <div class="absolute right-0 top-14 w-64 rounded-3xl bg-white/90 dark:bg-stu-panel/95 backdrop-blur-xl border border-stu-border/80 shadow-2xl p-4 animate-in fade-in slide-in-from-top-3 duration-250 z-50">
      <!-- User Info Header -->
      <div class="flex flex-col items-center text-center pb-3 border-b border-stu-border">
        <div class="h-14 w-14 rounded-full bg-stu-input border border-stu-border flex items-center justify-center mb-2 text-slate-600 dark:text-stu-text ring-2 ring-stu-accent/20">
          <i class="fa-solid fa-user text-lg"></i>
        </div>
        <p class="text-xs font-semibold text-stu-text/50 uppercase tracking-widest leading-none mb-1">Sesión Activa</p>
        <p class="text-sm font-bold text-stu-text truncate max-w-full px-1" [title]="userName">{{ userName }}</p>
        <span class="mt-1.5 inline-flex items-center rounded-full bg-stu-accent/15 px-2.5 py-0.5 text-[10px] font-semibold text-stu-accent border border-stu-accent/25">
          Administrador
        </span>
      </div>

      <!-- Actions List -->
      <div class="mt-3">
        <button
          (click)="openLogoutModal()"
          class="group flex w-full items-center gap-3 rounded-2xl px-3.5 py-2.5 text-sm font-semibold text-stu-text/80 transition-all duration-200 hover:bg-rose-500/10 hover:text-rose-600 dark:hover:text-rose-400 focus:outline-none"
        >
          <span class="flex h-8 w-8 items-center justify-center rounded-xl bg-stu-input border border-stu-border text-slate-600 dark:text-stu-text transition-colors group-hover:bg-rose-500/15 group-hover:text-rose-600 dark:group-hover:text-rose-400 group-hover:border-rose-500/25 shrink-0">
            <i class="fa-solid fa-arrow-right-from-bracket text-xs"></i>
          </span>
          <span>Cerrar sesión</span>
        </button>
      </div>
    </div>

    <!-- Click Outside Overlay to close dropdown -->
    <div class="fixed inset-0 z-40 cursor-default" (click)="closeDropdown()"></div>
  }
</div>

<!-- Logout Confirmation Modal -->
@if (showLogoutModal()) {
  <app-confirm-modal
    [itemName]="userName"
    [title]="'Confirmar cierre'"
    [message]="'¿Estás seguro de cerrar sesión'"
    [colorButton]="'red'"
    [buttonMessage]="'Cerrar sesión'"
    [toastMessage]="'Sesión cerrada con éxito'"
    (confirm)="confirmLogout()"
    (closeModal)="showLogoutModal.set(false)"
  ></app-confirm-modal>
}
