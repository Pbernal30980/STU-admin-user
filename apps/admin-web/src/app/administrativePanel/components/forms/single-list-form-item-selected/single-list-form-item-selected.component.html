<style>
  .max-h-select {
    max-height: 180px;
    overflow-y: auto;
  }
</style>
<div class="mt-5 max-w-xl sm:mt-5 mx-auto">
  <div class="flex flex-col relative">
    <label class="block text-sm font-semibold leading-6 text-stu-text">Barrio</label>

    <div class="w-full">
      <div class="soft-input flex items-center !py-1 !px-2 relative w-full cursor-pointer my-2 border border-stu-border bg-stu-input rounded-2xl focus-within:border-stu-accent transition-colors duration-200">
        <div class="flex flex-auto flex-wrap"></div>
        <input 
          [value]="inputValue()" 
          (input)="onSearchInput($event)"
          (focus)="onInputFocus()"
          placeholder="Buscar barrio..."
          class="bg-transparent p-1 px-2 appearance-none outline-none w-full text-stu-text placeholder:text-stu-text/40 border-none ring-0">
        <div class="text-stu-text/40 w-8 py-1 pl-2 pr-1 border-l flex items-center border-stu-border/50">
          <button (click)="toggleDropdown(); $event.stopPropagation()" type="button"
            class="cursor-pointer w-6 h-6 outline-none focus:outline-none flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
              class="feather feather-chevron-down w-4 h-4 transition-transform duration-200"
              [class.rotate-180]="isDropdownOpen">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
        </div>
      </div>
    </div>

    @if(isDropdownOpen){
    <div class="absolute shadow-xl bg-stu-panel border border-stu-border z-40 w-full left-0 top-full rounded-2xl max-h-select overflow-y-auto mt-2 transition-all duration-200">
      @if (filteredNeighborhoods().length === 0) {
        <div class="p-4 text-sm text-stu-text/50 text-center font-medium">No se encontraron barrios</div>
      }
      @for (item of filteredNeighborhoods(); track item) {
      <div class="flex flex-col w-full">
        <div (click)="selectNeighborhood(item)" 
          class="cursor-pointer w-full border-b border-stu-border/30 last:border-b-0 hover:bg-stu-accent/10 hover:text-stu-accent transition-colors duration-150">
          <div class="flex w-full items-center p-3 pl-4">
            <div class="w-full text-sm font-medium text-stu-text">{{item.name}}</div>
          </div>
        </div>
      </div>
      }
    </div>
    }

  </div>

  @if(isDropdownOpen){
    <div class="h-44"></div>
  }
</div>
