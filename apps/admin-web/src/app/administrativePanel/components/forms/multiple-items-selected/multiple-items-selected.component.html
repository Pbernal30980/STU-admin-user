<div (click)="toggleDropdown()"
  class="soft-input flex items-center !py-1 !px-2 relative w-full cursor-pointer my-2 border border-stu-border bg-stu-input rounded-2xl focus-within:border-stu-accent transition-colors duration-200">
  <div class="flex w-full flex-auto flex-wrap">
    @for (item of (bandera() ? neighborhoodService.neighborhoodsSelected() : stopsService.stopsSelected()); track item) {
    <div
      class="flex justify-center items-center m-1 font-medium py-1 px-2.5 rounded-xl text-stu-text bg-stu-border/40 border border-stu-border/70 hover:bg-stu-border/60 transition-colors duration-150">
      <div class="text-xs font-normal leading-none max-w-full flex-initial">{{item.name}}</div>
      <div class="flex flex-auto flex-row-reverse">
        <div (click)="itemToRemove(item); $event.stopPropagation()">
          <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="feather feather-x cursor-pointer hover:text-stu-accent rounded-full w-4 h-4 ml-2 transition-colors">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </div>
      </div>
    </div>
    }
    <div class="flex-1 min-w-[150px]">
      <input disabled 
        [placeholder]="(bandera() ? neighborhoodService.neighborhoodsSelected() : stopsService.stopsSelected()).length == 0 ? (bandera() ? 'Seleccione los barrios' : 'Seleccione las paradas') : ''"
        style="pointer-events: none;"
        class="bg-transparent p-1 px-2 appearance-none outline-none h-full w-full text-stu-text placeholder:text-stu-text/40 border-none ring-0 pointer-events-none">
    </div>
  </div>
  <div class="text-stu-text/40 w-8 py-1 pl-2 pr-1 border-l flex items-center border-stu-border/50">
    <button (click)="toggleDropdown(); $event.stopPropagation()" type="button"
      class="cursor-pointer w-6 h-6 outline-none focus:outline-none flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" fill="none" viewBox="0 0 24 24"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
        class="feather feather-chevron-down w-4 h-4 transition-transform duration-200"
        [class.rotate-180]="isOpen()">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </button>
  </div>
</div>
