<style>
  .max-h-select {
    max-height: 180px;
    overflow-y: auto;
  }
</style>
<div class="max-w-xl mt-5 sm:mt-5 mx-auto">

  <div class="grid grid-cols-1 relative">
    <label class="block text-sm font-semibold leading-6 text-stu-text">{{bandera() ? "Barrios" : "Paradas"}}</label>
    <app-multiple-items-selected 
      [bandera]="bandera()" 
      [isOpen]="isDropdownOpen"
      (isDropdownOpen)="toggleDropdown()" />
    
    @if(isDropdownOpen){
    <div
      class="absolute shadow-xl bg-stu-panel border border-stu-border z-40 w-full left-0 top-full rounded-2xl max-h-select overflow-y-auto mt-2 transition-all duration-200">
      @for (item of (bandera() ? neighborhoodService.neighborhoods() : stopService.stops()); track item) {
      <div class="flex flex-col w-full">
        <div (click)="itemsToAdd(item)" 
          class="cursor-pointer w-full border-b border-stu-border/30 last:border-b-0 hover:bg-stu-accent/10 hover:text-stu-accent transition-colors duration-150">
          <div class="flex w-full items-center p-3 pl-4">
            <div class="w-full text-sm font-medium text-stu-text">{{item.name}}</div>
          </div>
        </div>
      </div>
      }
    </div>
    }
  </div>

  @if(isDropdownOpen){
  <div class="h-44"></div>
  }

</div>
